<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Flashcards: Demografia e População</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6fb; /* Fundo suave a combinar com o tema */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            margin: 0;
            color: #333;
        }
        .nav-back {
            align-self: flex-start;
            margin-bottom: 20px;
            text-decoration: none;
            background: #8e44ad; /* Roxo do tema */
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .nav-back:hover {
            background: #732d91;
        }
        h1 { color: #2c3e50; text-align: center; }
        .flashcard-container {
            width: 90%;
            max-width: 500px;
            height: 300px;
            perspective: 1000px;
            margin: 20px 0;
            cursor: pointer;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-radius: 15px;
        }
        .flashcard.flip { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2em;
            line-height: 1.5;
        }
        .card-front {
            background: linear-gradient(135deg, #8e44ad, #ff758c); /* Gradiente quente */
            color: white;
            font-weight: bold;
            font-size: 1.4em;
        }
        .card-back {
            background-color: #fff;
            color: #333;
            transform: rotateY(180deg);
            border: 3px solid #8e44ad;
            overflow-y: auto;
        }
        .controls { display: flex; gap: 20px; margin-top: 20px; }
        button {
            padding: 12px 25px;
            font-size: 1.1em;
            cursor: pointer;
            background-color: #ff758c; /* Rosa de destaque */
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #ff5270; }
        .progress {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #8e44ad;
        }
        
        /* Ocultar barra de rolagem estética */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ff758c; border-radius: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">&#8592; Voltar ao Menu</a>
    
    <h1>Flashcards: 30 Conceitos de Demografia</h1>
    <p>Clique no cartão para revelar a resposta.</p>
    
    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front" id="card-front"></div>
            <div class="card-face card-back" id="card-back"></div>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="prevCard()">&#8592; Anterior</button>
        <button onclick="nextCard()">Próximo &#8594;</button>
    </div>
    <div class="progress" id="progress"></div>
    
    <script>
        const cards = [
            { q: "O que estuda a Demografia?", a: "É a ciência que estuda a dinâmica, a estrutura e a distribuição das populações humanas, analisando estatísticas como nascimentos, mortes e migrações." },
            { q: "Qual é a diferença entre um país Populoso e um país Povoado?", a: "Populoso refere-se à população absoluta total (muitos habitantes). Povoado refere-se à população relativa ou densidade demográfica (muitos habitantes por km²)." },
            { q: "O que é a Taxa de Natalidade?", a: "É o número de nados-vivos por cada mil habitantes numa determinada área, ao longo de um ano." },
            { q: "O que é a Taxa de Mortalidade?", a: "É o número de óbitos por cada mil habitantes numa determinada área, num período de um ano." },
            { q: "Como se calcula o Crescimento Vegetativo (ou Natural)?", a: "Calcula-se pela diferença entre a Taxa de Natalidade e a Taxa de Mortalidade (CV = TN - TM)." },
            { q: "O que é a Taxa de Fecundidade?", a: "É o número médio de filhos que uma mulher teria até ao final do seu período reprodutivo." },
            { q: "O que representa a Expectativa de Vida (Esperança de Vida ao nascer)?", a: "É o número médio de anos que um grupo de indivíduos nascidos no mesmo ano pode esperar viver." },
            { q: "O que indica a Taxa de Mortalidade Infantil?", a: "Indica o número de crianças que morrem antes de completar 1 ano de idade, por cada mil crianças nascidas vivas." },
            { q: "O que é um Censo Demográfico e qual a sua importância?", a: "É o recenseamento da população. Serve para recolher dados sobre as condições de vida, fundamentais para a criação de políticas públicas. No Brasil, é feito pelo IBGE." },
            { q: "O que é a Transição Demográfica?", a: "É o processo de passagem de uma fase com altas taxas de natalidade e mortalidade para uma fase em que ambas as taxas são baixas, estabilizando o crescimento populacional." },
            { q: "Como é a Fase 1 da Transição Demográfica (Pré-industrial)?", a: "Caracteriza-se por elevadas taxas de natalidade e mortalidade. O crescimento vegetativo é muito baixo ou nulo." },
            { q: "O que ocorre na Fase 2 da Transição (Explosão Demográfica)?", a: "A mortalidade cai drasticamente (devido a avanços na medicina e saneamento), mas a natalidade continua alta, gerando um rápido e enorme crescimento populacional." },
            { q: "Qual a principal característica da Fase 3 da Transição?", a: "Ocorre uma queda na taxa de natalidade (urbanização, métodos contracetivos, mulher no mercado de trabalho), fazendo com que o crescimento populacional comece a desacelerar." },
            { q: "Como se descreve a Fase 4 da Transição Demográfica?", a: "A natalidade e a mortalidade estabilizam-se em níveis muito baixos. O crescimento populacional aproxima-se de zero e a população envelhece." },
            { q: "O que defende a Teoria Malthusiana?", a: "Criada por Thomas Malthus, afirma que a população cresce em progressão geométrica (PG) e a produção de alimentos em progressão aritmética (PA), o que levaria à escassez e à fome." },
            { q: "Qual é o foco da Teoria Neomalthusiana?", a: "Surgiu no pós-guerra e defende que o excesso populacional nos países subdesenvolvidos é a causa da pobreza, propondo um controlo rigoroso da natalidade." },
            { q: "O que argumenta a Teoria Reformista (ou Marxista)?", a: "Contrapõe os Neomalthusianos afirmando que 'a superpopulação é consequência da pobreza, e não a causa'. Defende reformas sociais e melhor distribuição de rendimentos." },
            { q: "O que é o Bónus Demográfico (Janela Demográfica)?", a: "É o período em que a População Economicamente Ativa (PEA) é superior à população dependente (crianças e idosos), favorecendo o crescimento económico do país." },
            { q: "Numa Pirâmide Etária, o que representa a Base larga?", a: "Representa uma elevada taxa de natalidade e uma grande proporção de jovens, típico de países subdesenvolvidos." },
            { q: "Numa Pirâmide Etária, o que indica o alargamento do Corpo (centro)?", a: "Indica o aumento da população adulta e a redução gradual da fecundidade, marcando o bónus demográfico." },
            { q: "Numa Pirâmide Etária, o que significa um Topo largo?", a: "Significa uma elevada esperança de vida e uma grande quantidade de idosos, típico de países desenvolvidos (envelhecimento populacional)." },
            { q: "Quais são os desafios do Envelhecimento Populacional?", a: "Aumento dos gastos com saúde pública, pressão sobre o sistema de segurança social (pensões) e possível falta de mão de obra (PEA)." },
            { q: "Qual a diferença entre Emigração e Imigração?", a: "Emigração é o ato de sair do local de origem (país ou região). Imigração é o ato de entrar e estabelecer-se num novo local." },
            { q: "O que é o Saldo Migratório?", a: "É a diferença matemática entre o número de imigrantes (entradas) e o número de emigrantes (saídas) de um determinado território." },
            { q: "O que significa 'Fuga de Cérebros' (Brain Drain)?", a: "É a emigração de profissionais altamente qualificados (cientistas, médicos, engenheiros) de países em desenvolvimento para países desenvolvidos." },
            { q: "O que é a Migração Pendular?", a: "É o movimento diário de vaivém de pessoas entre municípios, geralmente por motivos de trabalho ou estudo (ex: morar na periferia e trabalhar na capital)." },
            { q: "Como se define Transumância (ou Migração Sazonal)?", a: "É uma migração temporária ligada às estações do ano, como trabalhadores que se deslocam durante a época das colheitas e depois regressam." },
            { q: "O que é a População Economicamente Ativa (PEA)?", a: "É o grupo de pessoas que estão inseridas no mercado de trabalho ou que procuram ativamente emprego (trabalhadores e desempregados)." },
            { q: "O que é a População Economicamente Inativa (PEI)?", a: "Grupo de pessoas que não exercem nem procuram atividade remunerada, como crianças, estudantes em dedicação exclusiva, reformados e donas de casa." },
            { q: "Como se caracteriza a distribuição populacional no Brasil?", a: "É irregular e mal distribuída. A população está fortemente concentrada na faixa litoral e na região Sudeste, devido a fatores históricos e económicos." }
        ];

        let currentCard = 0;
        const flashcard = document.getElementById('flashcard');
        const frontEl = document.getElementById('card-front');
        const backEl = document.getElementById('card-back');
        const progressEl = document.getElementById('progress');

        function updateCard() {
            flashcard.classList.remove('flip');
            setTimeout(() => {
                frontEl.textContent = cards[currentCard].q;
                backEl.textContent = cards[currentCard].a;
                progressEl.textContent = `Cartão ${currentCard + 1} de ${cards.length}`;
            }, 200);
        }

        function flipCard() { flashcard.classList.toggle('flip'); }
        function nextCard() { if (currentCard < cards.length - 1) { currentCard++; updateCard(); } }
        function prevCard() { if (currentCard > 0) { currentCard--; updateCard(); } }

        updateCard();
    </script>
</body>
</html>
