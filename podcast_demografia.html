<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Periferia no Centro | Demografia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mantendo a Identidade Visual do Portal */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            min-height: 100vh;
        }
        
        .header {
            background-color: rgba(255, 255, 255, 0.95);
            width: 100%;
            padding: 20px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-bottom: 5px solid #8e44ad;
            position: relative;
        }
        
        .header h1 { margin: 0; color: #2c3e50; font-size: 2em; }
        .header p { font-size: 1.1em; color: #555; margin-top: 5px; font-weight: 500; }

        .btn-voltar {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            text-decoration: none;
            color: #8e44ad;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }
        .btn-voltar:hover { color: #2c3e50; }

        @media (max-width: 768px) {
            .btn-voltar { position: static; transform: none; display: inline-block; margin-bottom: 10px; }
        }

        .content-area {
            width: 90%;
            max-width: 700px;
            margin: 40px 0;
        }

        /* Estilização do Cartão do Podcast */
        .podcast-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-top: 6px solid #8e44ad;
        }

        /* Capa do Podcast */
        .cover-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-bottom: 4px solid #fbc2eb;
        }

        /* Truque para transformar o YouTube em um Player de Áudio */
        .yt-audio-container {
            position: relative;
            width: 100%;
            height: 90px; /* Altura exata para focar apenas nos controles de áudio */
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            margin-top: 25px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        
        .yt-audio-container iframe {
            position: absolute;
            top: -20px; /* Empurra a parte do vídeo para cima, escondendo-a */
            left: 0;
            width: 100%;
            height: 130px; /* Altura suficiente para carregar os controles */
            border: none;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="btn-voltar">← Voltar ao Menu</a>
        <h1>🎧 Podcast Demografia</h1>
        <p>A geografia pensada e debatida a partir da nossa realidade.</p>
    </header>

    <div class="content-area">
        <div class="podcast-card">
            <img src="podcast_som.png" alt="Capa: Podcast Periferia no Centro" class="cover-image">
            
            <div class="p-8 text-center">
                <h2 class="text-3xl font-bold text-purple-800 mb-3">Periferia no Centro</h2>
                <p class="text-gray-600 text-lg mb-4">
                    Ouça este episódio especial perfeito para revisar as dinâmicas sociais e a transição demográfica a caminho da escola ou no intervalo. Dê o play e fortaleça seus estudos!
                </p>

                <div class="yt-audio-container">
                    <iframe 
                        src="https://www.youtube.com/embed/f9cIHXrNPy8?controls=1&showinfo=0&rel=0&modestbranding=1" 
                        title="Podcast de Áudio" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
